<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Galería de Assets 3D - Versión 2.2 Ancho de Pasillo Variable</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
</head>
<body>

    <div id="app-container">
        <aside id="sidebar-left">
            <h2>Mis Assets (.GLB)</h2>
            <div id="gallery"></div>
        </aside>

        <main id="canvas-container"></main>

        <aside id="sidebar-right">
            
            <div class="control-section">
                <h2>Estructura de Filas</h2>
                
                <div style="margin-bottom: 12px; display: flex; align-direction: column; gap: 5px;">
                    <label for="row-selector" style="font-size: 12px; color: #aaa;">Fila Activa:</label>
                    <select id="row-selector" style="width: 100%; background: #1a1a1a; color: #007acc; border: 1px solid #444; padding: 6px; border-radius: 4px; font-weight: bold;">
                        <optgroup label="Filas Vista Frente">
                            <option value="B0">Fila B0 (Z: 0m)</option>
                            <option value="B1">Fila B1 (Z: 4m)</option>
                            <option value="B2">Fila B2 (Z: 8m)</option>
                            <option value="B3">Fila B3 (Z: 12m)</option>
                            <option value="B4">Fila B4 (Z: 16m)</option>
                            <option value="B5">Fila B5 (Z: 20m)</option>
                            <option value="B6">Fila B6 (Z: 24m)</option>
                            <option value="B7">Fila B7 (Z: 28m)</option>
                            <option value="B8">Fila B8 (Z: 32m)</option>
                            <option value="B9">Fila B9 (Z: 36m)</option>
                        </optgroup>
                        <optgroup label="Filas Invertidas (Giro 180°)">
                            <option value="B0_opuesto">Fila B0 Opuesta (Enfrentada)</option>
                            <option value="B1_opuesto">Fila B1 Opuesta (Enfrentada)</option>
                            <option value="B2_opuesto">Fila B2 Opuesta (Enfrentada)</option>
                            <option value="B3_opuesto">Fila B3 Opuesta (Enfrentada)</option>
                            <option value="B4_opuesto">Fila B4 Opuesta (Enfrentada)</option>
                            <option value="B5_opuesto">Fila B5 Opuesta (Enfrentada)</option>
                            <option value="B6_opuesto">Fila B6 Opuesta (Enfrentada)</option>
                            <option value="B7_opuesto">Fila B7 Opuesta (Enfrentada)</option>
                            <option value="B8_opuesto">Fila B8 Opuesta (Enfrentada)</option>
                            <option value="B9_opuesto">Fila B9 Opuesta (Enfrentada)</option>
                        </optgroup>
                    </select>
                </div>

                <div id="objects-list" class="objects-list">
                    <p class="empty-list-msg">No hay objetos en esta fila</p>
                </div>
            </div>

            <hr>

            <div class="control-section">
                <h2>Controles</h2>
                
                <div class="slider-group">
                    <label for="spacing-slider">Espaciado de junta (X):</label>
                    <div class="slider-row">
                        <input type="range" id="spacing-slider" min="-2" max="5" step="0.01" value="0">
                        <input type="number" id="spacing-input" min="-2" max="5" step="0.01" value="0.00" class="precise-input">
                    </div>
                </div>

                <div class="slider-group" style="margin-top: 10px;">
                    <label for="aisle-slider" style="color: #007acc; font-weight: bold;">Ancho de Pasillo (Z):</label>
                    <div class="slider-row">
                        <input type="range" id="aisle-slider" min="0.5" max="6" step="0.01" value="3.00">
                        <input type="number" id="aisle-input" min="0.5" max="6" step="0.01" value="3.00" class="precise-input" style="color: #00ff55;">
                    </div>
                </div>

                <hr class="sub-hr">

                <h3>Iluminación</h3>
                
                <div class="slider-group">
                    <label for="exposure-slider">Exposición (ToneMap):</label>
                    <div class="slider-row">
                        <input type="range" id="exposure-slider" min="0.1" max="3" step="0.1" value="1.0">
                        <span id="exposure-value">1.0</span>
                    </div>
                </div>

                <div class="slider-group">
                    <label for="ambient-slider">Luz Ambiente:</label>
                    <div class="slider-row">
                        <input type="range" id="ambient-slider" min="0" max="3" step="0.1" value="1.2">
                        <span id="ambient-value">1.2</span>
                    </div>
                </div>

                <div class="slider-group">
                    <label for="main-light-slider">Luz Principal:</label>
                    <div class="slider-row">
                        <input type="range" id="main-light-slider" min="0" max="3" step="0.1" value="1.5">
                        <span id="main-light-value">1.5</span>
                    </div>
                </div>

                <div class="slider-group">
                    <label for="fill-light-slider">Luz de Relleno:</label>
                    <div class="slider-row">
                        <input type="range" id="fill-light-slider" min="0" max="3" step="0.1" value="0.8">
                        <span id="fill-light-value">0.8</span>
                    </div>
                </div>
            </div>

            <button id="export-btn" class="primary-btn">Exportar Escena .JSON</button>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
